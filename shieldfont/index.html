<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShieldFont — Moving to shieldfont.org</title>
    <meta
      name="description"
      content="ShieldFont is moving to shieldfont.org. Visit us there for the full experience."
    />
    <meta property="og:title" content="ShieldFont" />
    <meta
      property="og:description"
      content="ShieldFont is moving to shieldfont.org"
    />
    <meta property="og:type" content="website" />
    <link rel="icon" href="/favicon.png" />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        color-scheme: light dark;
      }
      body {
        font-family: Arial, Helvetica, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: hsl(0 0% 100%);
        color: hsl(0 0% 3.9%);
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: hsl(0 0% 3.9%);
          color: hsl(0 0% 98%);
        }
        .btn-primary {
          background: hsl(0 0% 98%) !important;
          color: hsl(0 0% 9%) !important;
        }
        .btn-primary:hover {
          background: hsl(0 0% 85%) !important;
        }
        .btn-secondary {
          border-color: hsl(0 0% 14.9%) !important;
          color: hsl(0 0% 63.9%) !important;
        }
        .btn-secondary:hover {
          border-color: hsl(0 0% 30%) !important;
          color: hsl(0 0% 98%) !important;
        }
        .message {
          color: hsl(0 0% 63.9%) !important;
        }
      }
      a {
        color: inherit;
        text-decoration: none;
      }

      .container {
        max-width: 420px;
        padding: 2rem;
        text-align: center;
      }

      .title {
        font-size: 1.125rem;
        font-weight: 600;
        margin-bottom: 1rem;
        letter-spacing: -0.01em;
      }

      .message {
        color: hsl(0 0% 45.1%);
        font-size: 0.875rem;
        line-height: 1.7;
        margin-bottom: 2rem;
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        align-items: center;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.375rem;
        padding: 0.625rem 1.25rem;
        border-radius: 0.375rem;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 0.8125rem;
        font-weight: 500;
        transition: all 0.15s ease;
        cursor: pointer;
        border: none;
        width: 100%;
        max-width: 280px;
      }

      .btn-primary {
        background: hsl(0 0% 9%);
        color: hsl(0 0% 98%);
      }

      .btn-primary:hover {
        background: hsl(0 0% 20%);
      }

      .btn-secondary {
        background: transparent;
        color: hsl(0 0% 45.1%);
        border: 1px solid hsl(0 0% 89.8%);
      }

      .btn-secondary:hover {
        color: hsl(0 0% 3.9%);
        border-color: hsl(0 0% 70%);
      }

      .arrow {
        transition: transform 0.15s ease;
        font-size: 0.75rem;
      }

      .btn-primary:hover .arrow {
        transform: translateX(2px);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="title">ShieldFont</div>
      <p class="message">
        As we get closer to the launch, we're moving this page to
        <strong>shieldfont.org</strong>.<br /><br />
        Feel free to explore and let us know if you have any feedback to improve
        the platform.
      </p>
      <div class="actions">
        <a href="https://shieldfont.org" class="btn btn-primary">
          Go to shieldfont.org <span class="arrow">&rarr;</span>
        </a>
        <a href="/" class="btn btn-secondary">Back to portfolio</a>
      </div>
    </div>
  </body>
</html>
