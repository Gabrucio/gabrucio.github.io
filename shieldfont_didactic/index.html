<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShieldFont — Moving to shieldfont.org</title>
    <meta
      name="description"
      content="ShieldFont is moving to shieldfont.org. Visit us there for the full experience."
    />
    <meta property="og:title" content="ShieldFont — How It Works" />
    <meta
      property="og:description"
      content="ShieldFont is moving to shieldfont.org"
    />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#1a1e20" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡</text></svg>"
    />
    <style>
      :root {
        --bg: #1a1e20;
        --bg2: #232829;
        --border: #3a4044;
        --g: #00ff79;
        --gd: #00cc62;
        --g-dim: rgba(0, 255, 121, 0.1);
        --text: #e8e4df;
        --dim: #999;
        --muted: #666;
        --mono: "JetBrains Mono", monospace;
        --sans: "Inter", sans-serif;
      }
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        font-size: 16px;
        line-height: 1.6;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      ::selection {
        background: var(--g);
        color: #000;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      :focus-visible {
        outline: 2px solid var(--g);
        outline-offset: 3px;
      }

      .grain {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.018;
        mix-blend-mode: overlay;
      }
      .grain::after {
        content: "";
        position: absolute;
        inset: -100%;
        width: 300%;
        height: 300%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 256px;
        animation: grain 0.5s steps(1) infinite;
      }
      @keyframes grain {
        0%,
        100% {
          transform: translate(0, 0);
        }
        10% {
          transform: translate(-5%, -10%);
        }
        30% {
          transform: translate(3%, -15%);
        }
        50% {
          transform: translate(12%, 9%);
        }
        70% {
          transform: translate(9%, 4%);
        }
        90% {
          transform: translate(-1%, 7%);
        }
      }

      .container {
        max-width: 520px;
        padding: 2.5rem;
        text-align: center;
      }

      .shield {
        font-size: 4rem;
        margin-bottom: 1.5rem;
        display: block;
      }

      h1 {
        font-family: var(--mono);
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-bottom: 1rem;
      }

      h1 span {
        color: var(--g);
      }

      .message {
        color: var(--dim);
        font-size: 1rem;
        line-height: 1.7;
        margin-bottom: 2.5rem;
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        align-items: center;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.85rem 2rem;
        border-radius: 8px;
        font-family: var(--mono);
        font-size: 0.875rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        transition: all 0.2s ease;
        cursor: pointer;
        border: none;
        width: 100%;
        max-width: 320px;
      }

      .btn-primary {
        background: var(--g);
        color: #000;
      }

      .btn-primary:hover {
        background: var(--gd);
        transform: translateY(-1px);
        box-shadow: 0 4px 20px rgba(0, 255, 121, 0.25);
      }

      .btn-secondary {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
      }

      .btn-secondary:hover {
        color: var(--text);
        border-color: var(--dim);
      }

      .arrow {
        transition: transform 0.2s ease;
      }

      .btn-primary:hover .arrow {
        transform: translateX(3px);
      }
    </style>
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <div class="container">
      <span class="shield" aria-hidden="true">🛡</span>
      <h1>Shield<span>Font</span></h1>
      <p class="message">
        As we get closer to the launch, we're moving this page to
        <strong>shieldfont.org</strong>.<br /><br />
        Feel free to explore and let us know if you have any feedback to improve
        the platform.
      </p>
      <div class="actions">
        <a href="https://shieldfont.org" class="btn btn-primary">
          Go to shieldfont.org <span class="arrow">&rarr;</span>
        </a>
        <a href="/" class="btn btn-secondary">Back to portfolio</a>
      </div>
    </div>
  </body>
</html>
