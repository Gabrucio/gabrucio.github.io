<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLAR OPPOSITES — Planet Rise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Gilda+Display&family=DM+Sans:wght@300;400;500;600;700&family=Spline+Sans+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --space: #08081A;
    --ice: #60A5FA;
    --gold: #F59E0B;
    --gold-bright: #FCD34D;
    --orange: #F26522;
    --white: #F0F0F8;
    --muted: rgba(240,240,248,0.35);
    --slate: #1E293B;
    --sand: #FEF3C7;
    --mono: 'Spline Sans Mono', monospace;
    --body: 'DM Sans', sans-serif;
    --display: 'Gilda Display', serif;
    --logo: 'Syne', sans-serif;
  }

  body {
    font-family: var(--body);
    color: var(--white);
    background: var(--space);
    overflow: hidden;
    height: 100vh;
    height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  /* ══════════════════════════════════════
     STAR FIELD
     ══════════════════════════════════════ */
  .starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
  }
  @keyframes twinkle {
    0%, 100% { opacity: var(--base-op); }
    50% { opacity: calc(var(--base-op) * 0.3); }
  }

  /* ══════════════════════════════════════
     HERO — exactly 100vh, no scroll
     ══════════════════════════════════════ */
  .hero {
    position: relative;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(1.5rem, 3vw, 3rem) 1.5rem;
    padding-bottom: clamp(5rem, 18vw, 12rem);
    z-index: 1;
    overflow: hidden;
  }

  /* ══════════════════════════════════════
     THE SUN — behind content, center-top
     ══════════════════════════════════════ */
  .sun {
    position: absolute;
    top: clamp(2vh, 6vh, 8vh);
    left: 50%;
    transform: translateX(-50%);
    width: clamp(180px, 28vh, 320px);
    height: clamp(180px, 28vh, 320px);
    border-radius: 50%;
    background: radial-gradient(
      circle,
      #FCD34D 0%,
      #F59E0B 18%,
      rgba(245,158,11,0.35) 38%,
      rgba(245,158,11,0.08) 55%,
      transparent 70%
    );
    z-index: 0;
    pointer-events: none;
  }
  .sun::before {
    content: '';
    position: absolute;
    inset: -60%;
    border-radius: 50%;
    background: radial-gradient(
      circle,
      rgba(252,211,77,0.06) 0%,
      rgba(245,158,11,0.03) 40%,
      transparent 70%
    );
  }
  .sun-flare-1 {
    position: absolute;
    top: clamp(2vh, 6vh, 8vh);
    left: 50%;
    transform: translateX(-50%) rotate(35deg);
    width: clamp(300px, 50vh, 600px);
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, rgba(252,211,77,0.12) 30%, rgba(252,211,77,0.25) 50%, rgba(252,211,77,0.12) 70%, transparent 100%);
    z-index: 0;
    pointer-events: none;
    margin-top: clamp(90px, 14vh, 160px);
  }
  .sun-flare-2 {
    position: absolute;
    top: clamp(2vh, 6vh, 8vh);
    left: 50%;
    transform: translateX(-50%) rotate(-25deg);
    width: clamp(240px, 42vh, 500px);
    height: 1.5px;
    background: linear-gradient(90deg, transparent 0%, rgba(252,211,77,0.08) 25%, rgba(252,211,77,0.18) 50%, rgba(252,211,77,0.08) 75%, transparent 100%);
    z-index: 0;
    pointer-events: none;
    margin-top: clamp(90px, 14vh, 160px);
  }
  .sun-flare-3 {
    position: absolute;
    top: clamp(2vh, 6vh, 8vh);
    left: 50%;
    transform: translateX(-50%) rotate(5deg);
    width: clamp(350px, 60vh, 700px);
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(252,211,77,0.05) 20%, rgba(252,211,77,0.15) 50%, rgba(252,211,77,0.05) 80%, transparent 100%);
    z-index: 0;
    pointer-events: none;
    margin-top: clamp(90px, 14vh, 160px);
  }

  /* ══════════════════════════════════════
     THE GLOBE — massive, bleeding from bottom
     ══════════════════════════════════════ */
  .globe-anchor {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 90vw;
    height: 90vw;
    max-width: 1200px;
    max-height: 1200px;
    pointer-events: none;
    z-index: 0;
    margin-bottom: -75vw;
  }
  @media (min-width: 1334px) {
    .globe-anchor { margin-bottom: -1000px; }
  }

  .globe {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    position: relative;
    overflow: hidden;
    background: radial-gradient(
      ellipse 70% 70% at 38% 25%,
      rgba(40, 60, 120, 0.35) 0%,
      rgba(18, 25, 55, 0.7) 45%,
      rgba(8, 8, 26, 0.95) 80%,
      rgba(8, 8, 26, 1) 100%
    );
    box-shadow:
      inset -30px -30px 80px rgba(0,0,0,0.6),
      inset 18px 18px 60px rgba(96,165,250,0.06);
  }
  .globe::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: radial-gradient(
      ellipse 100% 30% at 50% 0%,
      rgba(96,165,250,0.15) 0%,
      rgba(96,165,250,0.04) 40%,
      transparent 70%
    );
    z-index: 3;
    pointer-events: none;
  }
  .globe::after {
    content: '';
    position: absolute;
    top: -2px;
    left: 30%;
    right: 30%;
    height: 6px;
    border-radius: 50%;
    background: radial-gradient(
      ellipse at 50% 0%,
      rgba(245,158,11,0.12) 0%,
      transparent 80%
    );
    z-index: 4;
    pointer-events: none;
    filter: blur(3px);
  }
  .globe-grid {
    position: absolute;
    inset: 0;
    z-index: 1;
    opacity: 0.08;
  }
  .globe-pin {
    position: absolute;
    z-index: 5;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .globe-pin-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--ice);
    box-shadow: 0 0 12px var(--ice), 0 0 30px rgba(96,165,250,0.3);
    position: relative;
  }
  .globe-pin-dot::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1px solid var(--ice);
    opacity: 0;
    animation: ping 2.5s cubic-bezier(0, 0, 0.2, 1) infinite;
  }
  @keyframes ping {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(3); opacity: 0; }
  }
  .globe-pin-label {
    font-family: var(--mono);
    font-size: clamp(0.5rem, 0.7vw, 0.6rem);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-top: 4px;
    color: var(--ice);
    opacity: 0.7;
    white-space: nowrap;
  }

  /* ══════════════════════════════════════
     HERO CONTENT — floats above everything
     ══════════════════════════════════════ */
  .hero-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .sunwing-mark {
    opacity: 0.35;
    margin-bottom: clamp(0.8rem, 1.5vw, 1.2rem);
  }

  .brand-logo {
    font-family: var(--logo);
    font-weight: 800;
    font-size: clamp(1.8rem, 4.5vw, 2.8rem);
    line-height: 0.78;
    letter-spacing: -0.03em;
    color: var(--white);
    margin-bottom: clamp(0.5rem, 1vw, 0.8rem);
    text-transform: uppercase;
  }
  .brand-logo span { display: block; }

  .hero-headline {
    font-family: var(--display);
    font-size: clamp(1.3rem, 3vw, 2.2rem);
    font-weight: 400;
    color: var(--white);
    max-width: 500px;
    margin-bottom: clamp(1.2rem, 2.5vw, 2rem);
    line-height: 1.15;
  }
  .hero-sub {
    font-family: var(--body);
    font-weight: 300;
    font-size: clamp(0.75rem, 1.1vw, 0.95rem);
    color: rgba(240,240,248,0.3);
    margin-bottom: clamp(1.2rem, 2.5vw, 2rem);
  }

  /* ── INPUT GROUP ── */
  .input-group {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: clamp(0.6rem, 1.2vw, 1rem);
    flex-wrap: wrap;
    width: 100%;
    max-width: 420px;
  }
  .city-input {
    font-family: var(--body);
    font-size: clamp(0.85rem, 1.1vw, 0.95rem);
    padding: 0.65rem 1.1rem;
    border-radius: 60px;
    border: 1px solid rgba(240,240,248,0.12);
    background: rgba(240,240,248,0.05);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--white);
    flex: 1;
    min-width: 180px;
    outline: none;
    transition: border-color 0.25s;
  }
  .city-input:focus { border-color: var(--gold); }
  .city-input::placeholder { color: rgba(240,240,248,0.3); }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--orange);
    color: #fff;
    font-family: var(--body);
    font-weight: 600;
    font-size: clamp(0.82rem, 1vw, 0.95rem);
    padding: 0.65rem clamp(1.2rem, 2.5vw, 2rem);
    border-radius: 60px;
    border: none;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: transform 0.2s, box-shadow 0.2s;
    white-space: nowrap;
  }
  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(242,101,34,0.35);
  }

  /* ── CITY CHIPS ── */
  .chips {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.35rem;
    max-width: 480px;
    margin-bottom: clamp(0.8rem, 1.5vw, 1.2rem);
  }
  .chip {
    font-family: var(--mono);
    font-size: clamp(0.58rem, 0.8vw, 0.68rem);
    font-weight: 400;
    padding: 0.3rem 0.7rem;
    border-radius: 40px;
    border: 1px solid rgba(240,240,248,0.1);
    background: rgba(240,240,248,0.04);
    color: rgba(240,240,248,0.5);
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip:hover, .chip.active {
    background: rgba(245,158,11,0.1);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* ── SOLSTICE COUNTDOWN ── */
  .solstice-tag {
    font-family: var(--mono);
    font-size: clamp(0.52rem, 0.72vw, 0.6rem);
    color: rgba(240,240,248,0.2);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .solstice-tag b { color: rgba(240,240,248,0.35); font-weight: 500; }

  /* ══════════════════════════════════════
     DIALOG OVERLAY
     ══════════════════════════════════════ */
  .dialog-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .dialog-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }
  .dialog-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
  }

  .dialog-box {
    position: relative;
    z-index: 1;
    width: 90vw;
    max-width: 800px;
    max-height: 90vh;
    overflow-y: auto;
    background: rgba(8,8,26,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(240,240,248,0.08);
    border-radius: 20px;
    padding: clamp(1.5rem, 3vw, 2rem) clamp(1.5rem, 3vw, 2rem) clamp(1.2rem, 2vw, 1.5rem);
    transform: translateY(24px) scale(0.97);
    transition: transform 0.4s cubic-bezier(.22,1,.36,1);
  }
  .dialog-overlay.open .dialog-box {
    transform: translateY(0) scale(1);
  }

  .dialog-close {
    position: absolute;
    top: 12px;
    right: 14px;
    width: 32px;
    height: 32px;
    border: none;
    background: rgba(240,240,248,0.06);
    border-radius: 50%;
    color: rgba(240,240,248,0.5);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, color 0.2s;
    z-index: 2;
  }
  .dialog-close:hover {
    background: rgba(240,240,248,0.12);
    color: var(--white);
  }

  /* ── DIALOG SEARCH BAR ── */
  .dialog-search {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 0.6rem;
    max-width: 380px;
    margin-left: auto;
    margin-right: auto;
  }
  .dialog-search-input {
    font-family: var(--body);
    font-size: clamp(0.78rem, 1vw, 0.88rem);
    padding: 0.5rem 1rem;
    border-radius: 60px;
    border: 1px solid rgba(240,240,248,0.1);
    background: rgba(240,240,248,0.04);
    color: var(--white);
    flex: 1;
    min-width: 0;
    outline: none;
    transition: border-color 0.25s;
  }
  .dialog-search-input:focus { border-color: var(--gold); }
  .dialog-search-input::placeholder { color: rgba(240,240,248,0.25); }

  /* ── DIALOG CHIPS ── */
  .dialog-chips {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.3rem;
    margin-bottom: clamp(1rem, 2vw, 1.5rem);
  }
  .dialog-chip {
    font-family: var(--mono);
    font-size: clamp(0.52rem, 0.72vw, 0.62rem);
    font-weight: 400;
    padding: 0.22rem 0.55rem;
    border-radius: 40px;
    border: 1px solid rgba(240,240,248,0.08);
    background: rgba(240,240,248,0.03);
    color: rgba(240,240,248,0.4);
    cursor: pointer;
    transition: all 0.2s;
  }
  .dialog-chip:hover, .dialog-chip.active {
    background: rgba(245,158,11,0.1);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* ══════════════════════════════════════
     TWIN REVEAL — cards + compass
     ══════════════════════════════════════ */
  .reveal-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    width: 100%;
  }

  /* ── COMPASS (center) ── */
  .compass-wrap {
    flex-shrink: 0;
    width: 120px;
    height: 120px;
    position: relative;
  }
  .compass-svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 20px rgba(245,158,11,0.06));
  }
  .compass-needle {
    transition: transform 1.2s cubic-bezier(.22,1,.36,1);
    transform-origin: 60px 60px;
  }
  @keyframes compass-settle {
    0% { transform: rotate(calc(var(--target) - 15deg)); }
    40% { transform: rotate(calc(var(--target) + 8deg)); }
    70% { transform: rotate(calc(var(--target) - 3deg)); }
    100% { transform: rotate(var(--target)); }
  }

  /* ── TWIN CARDS ── */
  .twin-card {
    width: clamp(200px, 28vw, 260px);
    padding: clamp(1rem, 1.8vw, 1.4rem);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    opacity: 0;
    transition: none;
  }
  .twin-card.cold {
    background: rgba(96,165,250,0.06);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(96,165,250,0.15);
    transform: translateX(-30px);
    text-align: right;
  }
  .twin-card.warm {
    background: rgba(245,158,11,0.06);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(245,158,11,0.15);
    transform: translateX(30px);
  }
  .twin-card.show {
    opacity: 1;
    transform: translateX(0);
    transition: transform 0.7s cubic-bezier(.22,1,.36,1), opacity 0.5s ease;
  }
  .twin-card.cold.show { transition-delay: 0.15s; }
  .twin-card.warm.show { transition-delay: 0.4s; }

  /* ── CARD INTERNALS ── */
  .card-label {
    font-family: var(--mono);
    font-size: clamp(0.45rem, 0.62vw, 0.52rem);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    opacity: 0.4;
    margin-bottom: clamp(0.3rem, 0.6vw, 0.4rem);
  }
  .card-city {
    font-family: var(--display);
    font-size: clamp(1.1rem, 2vw, 1.5rem);
    line-height: 1.1;
    margin-bottom: 2px;
  }
  .card-region {
    font-family: var(--mono);
    font-size: clamp(0.48rem, 0.65vw, 0.55rem);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    opacity: 0.3;
    margin-bottom: clamp(0.5rem, 1vw, 0.8rem);
  }
  .uv-block { margin-bottom: clamp(0.3rem, 0.5vw, 0.4rem); }
  .uv-label {
    font-family: var(--mono);
    font-size: clamp(0.4rem, 0.55vw, 0.48rem);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    opacity: 0.3;
    margin-bottom: 2px;
  }
  .uv-num {
    font-family: var(--mono);
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 600;
    line-height: 1;
  }
  .cold .uv-num { color: var(--ice); }
  .warm .uv-num { color: var(--gold); }

  .card-temp {
    font-family: var(--mono);
    font-size: clamp(0.7rem, 1vw, 0.88rem);
    font-weight: 400;
    opacity: 0.6;
  }
  .card-personality {
    font-family: var(--body);
    font-size: clamp(0.52rem, 0.7vw, 0.62rem);
    font-style: italic;
    opacity: 0.28;
    margin-top: clamp(0.35rem, 0.7vw, 0.5rem);
    line-height: 1.3;
  }

  /* ── CLAIM STRIP ── */
  .claim-strip {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(0.8rem, 1.5vw, 1.5rem);
    margin-top: clamp(1rem, 2vw, 1.5rem);
    padding-top: clamp(0.8rem, 1.5vw, 1rem);
    border-top: 1px solid rgba(240,240,248,0.06);
    opacity: 0;
    transform: translateY(10px);
    transition: none;
  }
  .claim-strip.show {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.5s ease 0.7s, transform 0.5s ease 0.7s;
  }
  .claim-route {
    font-family: var(--mono);
    font-size: clamp(0.55rem, 0.78vw, 0.68rem);
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .claim-price {
    font-family: var(--mono);
    font-size: clamp(1.5rem, 3vw, 2.2rem);
    font-weight: 600;
    color: var(--white);
    line-height: 1;
  }
  .claim-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--orange);
    color: #fff;
    font-family: var(--body);
    font-weight: 600;
    font-size: clamp(0.82rem, 1vw, 0.95rem);
    padding: 0.65rem 2rem;
    border-radius: 60px;
    border: none;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .claim-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(242,101,34,0.35);
  }

  /* ══════════════════════════════════════
     MOBILE
     ══════════════════════════════════════ */
  @media (max-width: 640px) {
    .hero { padding-bottom: clamp(4rem, 16vw, 8rem); }
    .globe-anchor {
      width: 140vw;
      height: 140vw;
      margin-bottom: -118vw;
    }
    .sun {
      width: 160px;
      height: 160px;
      top: 3vh;
    }
    .sun-flare-1, .sun-flare-2, .sun-flare-3 {
      margin-top: 80px;
      top: 3vh;
    }
    .brand-logo { font-size: 1.6rem; }

    .dialog-box {
      padding: 1.2rem 1rem 1rem;
      border-radius: 16px;
      max-height: 88vh;
    }

    .reveal-row {
      flex-direction: column;
      gap: 0.6rem;
    }
    .compass-wrap {
      width: 80px;
      height: 80px;
      order: -1;
    }
    .twin-card {
      width: 100%;
      max-width: 100%;
      text-align: left !important;
    }
    .twin-card.cold { transform: translateY(-20px); }
    .twin-card.warm { transform: translateY(20px); }
    .twin-card.show { transform: translateY(0); }

    .claim-strip {
      flex-direction: column;
      gap: 0.4rem;
      text-align: center;
    }
  }

  @media (min-width: 641px) and (max-width: 768px) {
    .globe-anchor {
      width: 110vw;
      height: 110vw;
      margin-bottom: -92vw;
    }

  document.getElementById('cold-temp').innerHTML = data.cold.temp;
  document.getElementById('cold-personality').textContent = data.cold.personality;

  // Fill warm card
  document.getElementById('warm-city').textContent = data.warm.city;
  document.getElementById('warm-region').textContent = data.warm.region;
  document.getElementById('warm-uv').textContent = data.warm.uv;
  document.getElementById('warm-temp').innerHTML = data.warm.temp;
  document.getElementById('warm-personality').textContent = data.warm.personality;

  // Fill claim strip
  document.getElementById('deal-price').textContent = data.price;
  document.getElementById('claim-route').innerHTML = data.cold.city + ' &rarr; ' + data.warm.city;

  // Reset deal button
  var btn = document.getElementById('deal-btn');
  btn.textContent = 'Claim Deal';
  btn.style.background = '';

  // Show overlay
  overlay.classList.add('open');

  // Animate: needle spins, then cards appear
  setTimeout(function() {
    needle.style.transition = 'transform 1.2s cubic-bezier(.22,1,.36,1)';
    needle.style.transform = 'rotate(' + (data.angle || 0) + 'deg)';
  }, 100);

  setTimeout(function() { cardCold.classList.add('show'); }, 350);
  setTimeout(function() { cardWarm.classList.add('show'); }, 650);
  setTimeout(function() { claimStrip.classList.add('show'); }, 900);
}

// ── CLOSE DIALOG ──
function closeDialog() {
  overlay.classList.remove('open');
}

// ── HERO CTA + INPUT ──
document.getElementById('find-btn').addEventListener('click', function() {
  var input = document.getElementById('city-input').value.toLowerCase();
  var matched = currentCity;
  var keys = Object.keys(twins);
  for (var i = 0; i < keys.length; i++) {
    if (input.indexOf(keys[i]) !== -1) { matched = keys[i]; break; }
  }
  openDialog(matched);
});
document.getElementById('city-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    var input = this.value.toLowerCase();
    var matched = currentCity;
    var keys = Object.keys(twins);
    for (var i = 0; i < keys.length; i++) {
      if (input.indexOf(keys[i]) !== -1) { matched = keys[i]; break; }
    }
    openDialog(matched);
  }
});

// ── HERO CHIPS ──
document.querySelectorAll('.chip').forEach(function(chip) {
  chip.addEventListener('click', function() {
    var city = chip.dataset.city;
    document.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('active'); });
    chip.classList.add('active');
    document.getElementById('city-input').value = chip.textContent + ', ' + (provShort[city] || '');
    currentCity = city;
    openDialog(city);
  });
});

// ── DIALOG CHIPS ──
document.querySelectorAll('.dialog-chip').forEach(function(chip) {
  chip.addEventListener('click', function() {
    var city = chip.dataset.city;
    openDialog(city);
    // Also sync hero input
    document.getElementById('city-input').value = twins[city].cold.city + ', ' + (provShort[city] || '');
  });
});

// ── DIALOG SEARCH INPUT ──
dialogInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    var input = this.value.toLowerCase();
    var matched = currentCity;
    var keys = Object.keys(twins);
    for (var i = 0; i < keys.length; i++) {
      if (input.indexOf(keys[i]) !== -1) { matched = keys[i]; break; }
    }
    openDialog(matched);
  }
});

// ── CLOSE HANDLERS ──
document.getElementById('dialog-close').addEventListener('click', closeDialog);
document.getElementById('dialog-backdrop').addEventListener('click', closeDialog);
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeDialog();
});

// ── DEAL BUTTON ──
document.getElementById('deal-btn').addEventListener('click', function() {
  var btn = this;
  btn.textContent = 'Claimed!';
  btn.style.background = '#16a34a';
  setTimeout(function() { btn.textContent = 'Claim Deal'; btn.style.background = ''; }, 2000);
});
</script>
</body>
</html>
